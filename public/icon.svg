  </defs>
  <!-- Shield silhouette (gold border) -->
  <path d="M256 60 C300 60 360 72 404 92 C414 96 420 104 420 116 C420 250 400 360 256 456 C112 360 92 250 92 116 C92 104 98 96 108 92 C152 72 212 60 256 60 Z" fill="url(#cs-gold)"/>
  <!-- Violet field (inset) -->
