        fill="url(#cs-violet)" stroke="#2a0f52" stroke-width="6"
        transform="translate(256 258) scale(0.82) translate(-256 -258)"/>
  <!-- Rank / ascent chevrons -->
  <g fill="url(#cs-chev)">
    <path d="M256 168 L332 234 L332 272 L256 206 L180 272 L180 234 Z"/>
    <path d="M256 242 L332 308 L332 346 L256 280 L180 346 L180 308 Z"/>
