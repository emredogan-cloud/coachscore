<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CoachScore">
  <defs>
    <linearGradient id="cs-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d774"/>
      <stop offset="0.5" stop-color="#e8b339"/>
      <stop offset="1" stop-color="#a9781e"/>
    </linearGradient>
    <linearGradient id="cs-violet" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#3b146e"/>
    </linearGradient>
    <linearGradient id="cs-chev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fce39a"/>
      <stop offset="1" stop-color="#e0a82e"/>
