name: Production Build

on:
  push:
    branches: [main]

concurrency:
  group: production-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  production-build:
    name: Clean build + artifact verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack (pins pnpm via packageManager)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full validation suite
        run: pnpm validate

      - name: Validate Game-Data Reference Table
        run: pnpm validate:reference

      - name: Production build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_ENV: production

      - name: Verify build artifact + deployment readiness
        run: |
          test -d .next || { echo "::error::missing .next directory"; exit 1; }
          test -f .next/BUILD_ID || { echo "::error::missing .next/BUILD_ID"; exit 1; }
          echo "Build artifact verified — BUILD_ID=$(cat .next/BUILD_ID)"

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
            !.next/cache/**
          retention-days: 7
