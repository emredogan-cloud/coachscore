name: Security

on:
  pull_request:
  push:
    branches: ['**']
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies (fail on high/critical)
        run: pnpm audit --prod --audit-level high
      - name: Audit all dependencies (report only)
        run: pnpm audit --audit-level moderate || true

  secret-scan:
    name: Committed-secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan tracked files for secret patterns
        run: bash scripts/secret-scan.sh

  sast:
    name: Static analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan (security + typescript rulesets)
        run: semgrep scan --config p/security-audit --config p/typescript --error --metrics off
