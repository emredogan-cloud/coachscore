name: Validation

on:
  pull_request:
  push:
    branches: ['**']

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Format · Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint (no warnings allowed)
        run: pnpm lint --max-warnings=0

      - name: TypeScript (strict, no emit)
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Validate Game-Data Reference Table
        run: pnpm validate:reference

      - name: Production build
        run: pnpm build
